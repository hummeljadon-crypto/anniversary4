<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050608" />
  <meta name="description" content="A tiny four-month anniversary horror comedy." />
  <title>Happy 4 Months ❤️</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app">
    <section id="intro" class="scene active">
      <div class="film-grain"></div>
      <div class="center intro-copy">
        <p class="eyebrow">A very normal anniversary page</p>
        <h1>Don’t go in.</h1>
        <button id="enterBtn">Enter bathroom</button>
      </div>
    </section>

    <section id="bathroom" class="scene" hidden>
      <div id="bathroomLight" class="bathroom-light"></div>

      <div class="bathroom-art">
        <div id="lamp" class="lamp"></div>

        <div id="mirror" class="mirror">
          <div class="reflection"></div>
          <div class="face"></div>
          <svg class="cracks" viewBox="0 0 300 430" aria-hidden="true">
            <g fill="none" stroke="rgba(235,248,255,.94)" stroke-width="2.2">
              <path d="M150 215 L113 169 L78 122 L45 69" />
              <path d="M150 215 L167 155 L205 111 L256 73" />
              <path d="M150 215 L223 198 L278 159" />
              <path d="M150 215 L205 263 L251 318 L282 384" />
              <path d="M150 215 L142 278 L116 338 L80 401" />
              <path d="M150 215 L88 242 L42 289 L12 346" />
              <path d="M150 215 L92 196 L39 160" />
              <path d="M113 169 L151 148 L133 110" />
              <path d="M167 155 L184 182 L227 163" />
              <path d="M223 198 L238 238 L275 249" />
              <path d="M205 263 L173 284 L196 330" />
              <path d="M142 278 L102 265 L72 303" />
            </g>
          </svg>
        </div>

        <div class="sink">
          <div class="tap"></div>
          <div class="basin"></div>
          <div class="cabinet"></div>
        </div>
      </div>

      <div class="bottom-card">
        <p id="bathroomHint" class="eyebrow">Bathroom rule #1</p>
        <h2 id="bathroomText">Say it 3 times.</h2>
        <button id="sayBtn">Bloody Mary</button>
        <p id="countText" class="count">○ ○ ○</p>
      </div>
    </section>

    <section id="run" class="scene" hidden>
      <div id="chaseWorld" class="chase-world">
        <div class="hall hall-left"></div>
        <div class="hall hall-right"></div>
        <div id="ghost" class="ghost"></div>
        <div class="speed-lines"></div>
      </div>

      <div class="center lower chase-copy">
        <p id="runHint" class="eyebrow">Tap to run</p>
        <h1 id="runTitle">RUN.</h1>
        <button id="runBtn">RUN</button>
        <p id="runCount" class="run-count">0 / 7</p>
      </div>
    </section>

    <section id="hero" class="scene" hidden>
      <div class="hero-art">
        <div class="moon"></div>

        <div id="boyfriend" class="boyfriend">
          <div class="hair"></div>
          <div class="head"></div>
          <div class="body">J</div>
          <div class="cape"></div>
          <div class="arm"></div>
          <div id="slipper" class="slipper">🩴</div>
        </div>

        <div id="monster" class="monster">
          <div class="monster-face"></div>
        </div>

        <div id="impact" class="impact">POW</div>
      </div>

      <div class="bottom-card">
        <p id="heroHint" class="eyebrow">Plot armor activated</p>
        <h2 id="heroText">I got you.</h2>
        <button id="saveBtn">Save me</button>
      </div>
    </section>

    <section id="ending" class="scene ending" hidden>
      <div id="floatingHearts"></div>

      <div class="ending-card">
        <div id="heartBuild" class="heart-build" aria-hidden="true"></div>
        <div id="bigHeart" class="big-heart">♥</div>
        <p id="endingHint" class="eyebrow">Threat defeated</p>
        <h1>Happy 4 months</h1>
        <h2 id="name">baby girl ❤️</h2>
      </div>
    </section>
  </main>

  <button id="soundToggle" class="sound-toggle" aria-label="Mute sound" aria-pressed="false">🔊</button>
  <div id="flash"></div>
  <script src="script.js"></script>
</body>
</html>

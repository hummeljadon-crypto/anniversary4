<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050608" />
  <title>Happy 4 Months ❤️</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app">
    <section id="intro" class="scene active">
      <div class="center">
        <h1>Don’t go in.</h1>
        <button id="enterBtn">Enter bathroom</button>
      </div>
    </section>

    <section id="bathroom" class="scene" hidden>
      <div class="bathroom-art">
        <div id="mirror" class="mirror">
          <div class="face"></div>
          <div class="cracks"></div>
        </div>
        <div class="sink"></div>
      </div>

      <div class="bottom-card">
        <h2 id="bathroomText">Say it 3 times.</h2>
        <button id="sayBtn">Bloody Mary</button>
        <p id="countText">○ ○ ○</p>
      </div>
    </section>

    <section id="run" class="scene" hidden>
      <div class="chase-bg">
        <div class="ghost"></div>
      </div>
      <div class="center lower">
        <h1>RUN.</h1>
        <button id="runBtn">RUN</button>
      </div>
    </section>

    <section id="hero" class="scene" hidden>
      <div class="hero-art">
        <div class="boyfriend">
          <div class="head"></div>
          <div class="body">J</div>
          <div class="cape"></div>
          <div id="slipper" class="slipper">🩴</div>
        </div>
        <div id="monster" class="monster"></div>
      </div>

      <div class="bottom-card">
        <h2>I got you.</h2>
        <button id="saveBtn">Save me</button>
      </div>
    </section>

    <section id="ending" class="scene ending" hidden>
      <div id="floatingHearts"></div>
      <div class="ending-card">
        <div class="big-heart">♥</div>
        <h1>Happy 4 months</h1>
        <h2 id="name">my baby girl, Dannianlys ❤️</h2>
      </div>
    </section>
  </main>

  <div id="flash"></div>
  <script src="script.js"></script>
</body>
</html>
